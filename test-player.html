<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#05070c" />
<title>Test Player | GhoulStreams</title>
<link rel="icon" href="/Logo.svg?v=1" />
<style>
:root{--bg:#05070c;--panel:rgba(8,10,16,.72);--line:rgba(255,255,255,.08);--text:#eef2f8;--muted:#8a97ad;--accent:#19c89d;--accent2:#4d9fff;--live:#ff6278;--shadow:0 8px 40px rgba(0,0,0,.5),0 1px 0 rgba(255,255,255,.04) inset;--r-xl:22px;--r-lg:16px;--r-md:12px;--r-pill:999px;}
*,*::before,*::after{box-sizing:border-box} body{margin:0;min-height:100vh;color:var(--text);background:radial-gradient(circle at top left,rgba(77,159,255,.14),transparent 28%),radial-gradient(circle at top right,rgba(255,98,120,.10),transparent 26%),var(--bg);font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Segoe UI','Helvetica Neue',Arial,sans-serif;-webkit-font-smoothing:antialiased;overflow-x:hidden}
a{color:inherit;text-decoration:none} button{font-family:inherit;cursor:pointer;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
*{scrollbar-width:thin;scrollbar-color:rgba(132, 178, 225, 0.55) transparent}
*::-webkit-scrollbar{width:8px;height:8px}
*::-webkit-scrollbar-track{background:transparent}
*::-webkit-scrollbar-thumb{background:rgba(132, 178, 225, 0.46);border:2px solid transparent;border-radius:999px;background-clip:content-box}
*::-webkit-scrollbar-thumb:hover{background:rgba(155, 200, 240, 0.68);background-clip:content-box}
.wrap{max-width:1440px;margin:0 auto;padding:18px}
.topbar,.panel{background:var(--panel);border:1px solid var(--line);border-radius:var(--r-xl);box-shadow:var(--shadow);backdrop-filter:blur(18px) saturate(130%)}
.topbar{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:14px;padding:12px 16px}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:11px 14px;border-radius:12px;border:1px solid var(--line);background:rgba(255,255,255,.04);color:var(--text);font-weight:800}.btn.primary{background:rgba(255,98,120,.16);border-color:rgba(255,98,120,.55)}
.title-wrap{display:flex;flex-direction:column;gap:4px;min-width:0}.page-title{font-size:1.02rem;font-weight:900;line-height:1.25;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.page-sub{color:var(--muted);font-size:.82rem}
.layout{display:grid;grid-template-columns:minmax(0,1fr) 320px;gap:18px;align-items:start}
.player-card{overflow:hidden;border-radius:var(--r-xl)}
.player-head{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:18px;border-bottom:1px solid var(--line);border-radius:var(--r-xl) var(--r-xl) 0 0} .player-head h2{margin:0;font-size:1.08rem;font-weight:900;line-height:1.1;letter-spacing:-0.02em;color:var(--text)} .player-head p{margin:5px 0 0;color:var(--muted);font-size:.82rem}
.stream-title{display:flex;flex-direction:column;gap:4px;min-width:0}.stream-title h2{color:var(--text);text-wrap:balance}
.stream-sub{display:inline-flex;align-items:center;gap:8px;color:var(--muted)}
.stream-sub::before{content:'';width:6px;height:6px;border-radius:50%;background:linear-gradient(180deg,#19c89d,#4d9fff);box-shadow:0 0 10px rgba(25,200,157,.35)}
.player-shell{padding:14px;border-radius:var(--r-xl);overflow:hidden}
.player-frame{position:relative;aspect-ratio:16/9;background:rgba(0,0,0,.72);overflow:hidden;border:1px solid rgba(255,255,255,.07);border-radius:18px;isolation:isolate}
video{width:100%;height:100%;display:block;background:#000;object-fit:cover;position:relative;z-index:1;transform:translateZ(0);backface-visibility:hidden;image-rendering:auto}
.video-hud{position:absolute;inset:0;z-index:3;pointer-events:none;display:flex;flex-direction:column;justify-content:space-between;padding:14px 14px 88px;transition:opacity 180ms ease,transform 180ms ease}.video-hud.hidden{opacity:0;transform:translateY(8px)}
.overlay-row{display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap}
.overlay-row.top-info{justify-content:space-between;padding-right:58px}
.chip{display:inline-flex;align-items:center;gap:6px;padding:5px 10px;border-radius:var(--r-pill);background:rgba(255,255,255,.04);border:1px solid var(--line);color:var(--muted);font-size:.74rem;font-weight:800;transition:opacity 180ms ease,transform 180ms ease}.chip.hidden{opacity:0;transform:translateY(8px)}
.chip.live{color:#ff727e;border-color:rgba(255,31,62,.36);background:rgba(255,74,93,.12)}
.chip.note{color:var(--muted)}
.player-gradient{position:absolute;inset:0;z-index:2;pointer-events:none;background:rgba(0,0,0,.18);transition:opacity 180ms ease}
.player-gradient.hidden{opacity:.2}
.control-surface{position:absolute;inset:0;z-index:4;display:flex;flex-direction:column;justify-content:center;padding:14px;cursor:default}
.control-surface.idle{cursor:default}
.control-center{display:flex;align-items:center;justify-content:center;gap:18px;position:relative;z-index:1;transition:opacity 180ms ease,transform 180ms ease}
.control-center.hidden{opacity:0;transform:translateY(10px);pointer-events:none}
.control-lock{position:absolute;top:14px;right:14px;z-index:5;width:42px;height:42px;border-radius:50%;background:rgba(7,12,22,.8);border:1px solid rgba(255,255,255,.1);display:none;align-items:center;justify-content:center;color:var(--text)}
.control-lock.visible,.player-frame.controls-locked .control-lock{display:inline-flex}
.control-lock svg{width:18px;height:18px;display:block}.control-lock .unlock-icon{display:none}.player-frame.controls-locked .control-lock .lock-icon{display:none}.player-frame.controls-locked .control-lock .unlock-icon{display:block}
.player-frame.controls-locked .video-hud,.player-frame.controls-locked .control-center,.player-frame.controls-locked .control-bottom{display:none}
.player-frame.controls-locked .player-gradient{opacity:.04}
.icon-btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;width:42px;height:42px;border-radius:14px;padding:0;border:1px solid rgba(255,255,255,.10);background:rgba(8,10,16,.74);color:var(--text)}
.circle-btn{display:inline-flex;align-items:center;justify-content:center;width:68px;height:68px;border-radius:50%;font-size:1rem;font-weight:800;border:1px solid rgba(255,255,255,.10);background:rgba(8,10,16,.74);color:var(--text)}
#backTenBtn{transform:translateX(-164px)}
#forwardTenBtn{transform:translateX(164px)}
.circle-btn.play{width:88px;height:88px;background:rgba(255,255,255,.06);border-color:rgba(25,200,157,.4);box-shadow:0 0 0 6px rgba(25,200,157,.08)}
.circle-btn.play svg{width:34px;height:34px}.transport-icon{width:44px;height:44px;display:block}.play-icon{width:34px;height:34px;display:block}
.control-bottom{position:absolute;left:14px;right:14px;bottom:14px;z-index:1;display:grid;gap:10px;transition:opacity 180ms ease,transform 180ms ease}
.control-bottom.hidden{opacity:0;transform:translateY(10px);pointer-events:none}
.seek-wrap{position:relative;display:flex;align-items:center;width:100%;padding:8px 0}
.seek-track{position:absolute;left:0;right:0;height:5px;border-radius:var(--r-pill);background:rgba(255,255,255,.16);border:1px solid rgba(255,255,255,.08);pointer-events:none;box-shadow:inset 0 1px 0 rgba(255,255,255,.04)}
.seek-bar{width:100%;appearance:none;height:5px;border-radius:var(--r-pill);background:linear-gradient(to right, rgba(255, 74, 93, 0.98) 0%, rgba(255, 74, 93, 0.98) var(--seek-percent, 0%), rgba(255,255,255,0) var(--seek-percent, 0%), rgba(255,255,255,0) 100%);outline:none;cursor:pointer;position:relative;z-index:1;filter:drop-shadow(0 0 8px rgba(255,31,62,.16))}
.seek-bar::-webkit-slider-thumb{appearance:none;width:16px;height:16px;border-radius:50%;border:2px solid rgba(255, 31, 62, .85);background:#fff;box-shadow:0 0 0 4px rgba(255,31,62,.22),0 0 18px rgba(255,31,62,.28)}
.bottom-row{display:flex;align-items:center;justify-content:space-between;gap:10px}.time-group{display:inline-flex;align-items:center;gap:6px;padding:8px 12px;border-radius:var(--r-md);background:rgba(6,14,26,.72);border:1px solid rgba(255,255,255,.1);color:var(--text);font-variant-numeric:tabular-nums;font-size:.82rem;white-space:nowrap}
.actions{display:flex;align-items:center;gap:8px;flex-wrap:wrap;justify-content:flex-end}
.volume-control{position:relative;display:inline-flex;align-items:center}
.volume-pop{position:absolute;left:50%;bottom:calc(100% + 12px);display:none;align-items:center;gap:10px;padding:10px 12px;border-radius:16px;background:rgba(10,12,18,.94);border:1px solid var(--line);box-shadow:var(--shadow);backdrop-filter:blur(18px) saturate(130%);transform:translateX(-50%) translateY(8px);transform-origin:bottom center;z-index:10}
.volume-pop.open{display:inline-flex;opacity:1;transform:translateX(-50%) translateY(0)}
.volume-pop-btn{width:38px;height:38px;border-radius:12px;border:1px solid rgba(255,255,255,.14);background:rgba(255,255,255,.04);color:var(--text);display:inline-flex;align-items:center;justify-content:center;cursor:pointer}
.volume-pop-btn:hover{border-color:rgba(77,159,255,.35)}
.volume-pop-btn svg{width:16px;height:16px;display:block}
.volume-pop-slider{width:120px;appearance:none;height:4px;border-radius:var(--r-pill);background:linear-gradient(to right, rgba(25,200,157,.95) 0%, rgba(25,200,157,.95) var(--vol-percent,100%), rgba(255,255,255,.16) var(--vol-percent,100%), rgba(255,255,255,.16) 100%);outline:none;cursor:pointer;touch-action:none}
.volume-pop-slider::-webkit-slider-thumb{appearance:none;width:13px;height:13px;border-radius:50%;background:#fff;border:0;box-shadow:0 0 0 3px rgba(25,200,157,.22)}
.fit-icon{width:18px;height:18px;display:block}.icon-btn svg,.circle-btn svg{width:18px;height:18px;display:block;fill:currentColor}
.icon-btn .sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0}
.loading,.empty{color:var(--muted);text-align:center;padding:24px 12px;font-size:.88rem}
.meta{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;padding:14px 18px 18px}.big{font-size:1.12rem;font-weight:900;line-height:1.25;margin-bottom:6px}.small{color:var(--muted);font-size:.86rem;line-height:1.5}.chips{display:flex;gap:8px;flex-wrap:wrap}
.meta{border-radius:0 0 var(--r-xl) var(--r-xl)}
.side-card .section-head{padding:18px;border-bottom:1px solid var(--line)} .side-card .section-head h3{margin:0;font-size:1rem;font-weight:900}.side-card .section-head p{margin:4px 0 0;color:var(--muted);font-size:.82rem}
.side-card{border-radius:var(--r-xl)} .sources{padding:16px;display:flex;flex-direction:column;gap:12px}.source-item{padding:12px;border-radius:var(--r-lg);background:rgba(255,255,255,.02);border:1px solid var(--line)}.source-item-head{display:flex;align-items:center;justify-content:space-between;gap:10px}.source-quality{display:inline-flex;width:fit-content;padding:3px 8px;border-radius:var(--r-pill);background:rgba(77,159,255,.14);border:1px solid rgba(77,159,255,.2);color:#a6cbff;font-size:.7rem;font-weight:800}.source-btn{width:100%;margin-top:10px;padding:11px 14px;border-radius:12px;border:1px solid rgba(255,98,120,.6);background:rgba(255,98,120,.16);color:var(--text);font-weight:900}
.details{padding:16px 18px 18px;color:var(--muted);border-top:1px solid var(--line);font-size:.88rem;line-height:1.55}
.fullscreen-hidden{display:none!important}
.player-shell:fullscreen .player-head,.player-shell:fullscreen .meta,.player-shell:fullscreen .details,.player-shell:fullscreen .side-card{display:none!important}
.player-shell:fullscreen{
  width:100vw;
  height:100vh;
  max-width:none;
  margin:0;
  padding:0;
  border-radius:0;
  background:#000;
}
.player-shell:fullscreen .player-frame{
  width:100vw;
  height:100vh;
  aspect-ratio:auto;
  border-radius:0;
  border:none;
}
.player-shell:fullscreen video{
  width:100vw;
  height:100vh;
  object-fit:cover;
}
.player-shell:fullscreen .player-gradient,
.player-shell:fullscreen .video-hud,
.player-shell:fullscreen .control-surface{
  inset:0;
}
.player-shell:fullscreen .control-bottom{
  left:max(14px, env(safe-area-inset-left, 0px));
  right:max(14px, env(safe-area-inset-right, 0px));
  bottom:max(14px, env(safe-area-inset-bottom, 0px));
}
.player-shell:fullscreen .control-lock{
  top:max(14px, env(safe-area-inset-top, 0px));
  right:max(14px, env(safe-area-inset-right, 0px));
}
.player-shell:fullscreen #backTenBtn{transform:translateX(-280px)}
.player-shell:fullscreen #forwardTenBtn{transform:translateX(280px)}
.player-shell:not(:fullscreen) .player-frame{
  border-radius:18px;
}
@media (max-width:1100px){.layout{grid-template-columns:1fr}} @media (max-width:720px){.wrap{padding:12px}.page-title{white-space:normal}.player-head,.meta{padding-left:14px;padding-right:14px}.control-center{gap:12px}.circle-btn.play{width:76px;height:76px}.control-lock{top:10px;right:10px}.time-group{display:none}}
</style>
</head>
<body>
<div class="wrap">
  <div class="topbar fullscreen-hidden" id="topbar">
    <a class="btn" id="backToRecapsBtn" href="/recaps" aria-label="Back to recaps" title="Back to recaps">
      <svg viewBox="0 0 24 24" aria-hidden="true" fill="none" style="width:18px;height:18px;display:block">
        <path d="M15 18 9 12l6-6" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M9 12h12" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/>
      </svg>
    </a>
    <div class="title-wrap"><div id="pageTitle" class="page-title"></div><div id="pageSub" class="page-sub"></div></div>
    <a class="btn primary" href="/" aria-label="Open homepage" title="Open homepage">
      <svg viewBox="0 0 24 24" aria-hidden="true" fill="none" style="width:18px;height:18px;display:block">
        <path d="M12 4 3 11" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M12 4l9 7" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M5 10.5V20h14v-9.5" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M9.5 20v-6h5v6" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </a>
  </div>
  <div class="layout">
    <section class="panel player-card player-shell" id="playerShell">
      <div class="player-head" id="playerHead"><div class="stream-title"><h2 id="streamTitle">Loading race stream...</h2><p class="stream-sub" id="streamSub">Fetching sources for the selected recap</p></div><div class="chip" id="streamState">Resolving source</div></div>
      <div class="player-shell">
        <div class="player-frame is-paused" id="playerFrame">
          <video id="videoPlayer" autoplay playsinline webkit-playsinline></video>
          <div class="player-gradient" id="playerGradient"></div>
          <div class="video-hud" id="videoHud">
            <div class="overlay-row top-info"></div>
            <div class="overlay-row">
              <div class="chip" id="hudStatus">Ready</div>
            </div>
          </div>
          <div class="control-surface" id="controlSurface">
            <button class="icon-btn control-lock" id="controlsLockBtn" type="button" aria-label="Lock controls" title="Lock controls">
              <svg class="lock-icon" viewBox="0 0 24 24" aria-hidden="true" fill="none"><rect x="5" y="10" width="14" height="10" rx="2" stroke="currentColor" stroke-width="2"/><path d="M8 10V7a4 4 0 0 1 8 0v3" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
              <svg class="unlock-icon" viewBox="0 0 24 24" aria-hidden="true" fill="none"><rect x="5" y="10" width="14" height="10" rx="2" stroke="currentColor" stroke-width="2"/><path d="M12 14v2" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><path d="M9 10V7a4 4 0 0 1 7.2-2.4" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
              <span class="sr-only" id="controlsLockLabel">Lock controls</span>
            </button>
            <div class="control-center" id="controlCenter">
              <button class="circle-btn" id="backTenBtn" type="button" aria-label="Skip back 10 seconds"><svg class="transport-icon" viewBox="0 0 24 24" aria-hidden="true" fill="none"><path d="M11 7H5v6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><path d="M5 13c1.1-2.8 3.4-5 6.8-5 3.7 0 6.7 3 6.7 6.7S15.5 21 11.8 21c-2.4 0-4.5-1.2-5.7-3" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg></button>
              <button class="circle-btn play" id="playPauseBtn" type="button" aria-label="Play"><svg class="play-icon" id="playIcon" viewBox="0 0 24 24" aria-hidden="true" fill="currentColor"><path d="M8 5v14l11-7z"/></svg><svg class="play-icon" id="pauseIcon" viewBox="0 0 24 24" aria-hidden="true" fill="currentColor" style="display:none"><path d="M7 5h4v14H7zM13 5h4v14h-4z"/></svg></button>
              <button class="circle-btn" id="forwardTenBtn" type="button" aria-label="Skip forward 10 seconds"><svg class="transport-icon" viewBox="0 0 24 24" aria-hidden="true" fill="none"><path d="M13 7h6v6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><path d="M18 13c-1.1-2.8-3.4-5-6.8-5-3.7 0-6.7 3-6.7 6.7S7.5 21 11.2 21c2.4 0 4.5-1.2 5.7-3" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg></button>
            </div>
            <div class="control-bottom" id="controlBottom">
              <div class="seek-wrap">
                <div class="seek-track"></div>
                <input id="seekBar" class="seek-bar" type="range" min="0" max="100" step="0.1" value="0">
              </div>
              <div class="bottom-row">
                <div class="time-group"><span id="currentTime">0:00</span><span class="time-sep">/</span><span id="durationTime">0:00</span></div>
                <div class="actions">

                  <div class="volume-control" id="volumeControl">
                    <button class="icon-btn" id="muteBtn" type="button" aria-label="Mute">
                      <svg id="muteIcon" viewBox="0 0 24 24" aria-hidden="true" fill="none"><path d="M11 5L6.5 9H3v6h3.5L11 19V5Z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/><path d="M15.5 8.5a4.5 4.5 0 0 1 0 7" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><path d="M17.8 6.2a8 8 0 0 1 0 11.6" stroke="currentColor" stroke-width="2" stroke-linecap="round" opacity="0.85"/></svg>
                      <svg id="unmuteIcon" viewBox="0 0 24 24" aria-hidden="true" fill="none" style="display:none"><path d="M11 5L6.5 9H3v6h3.5L11 19V5Z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/><path d="M15 9l6 6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><path d="M21 9l-6 6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
                      <span class="sr-only">Mute</span>
                    </button>
                    <div class="volume-pop" id="volumePopover" aria-hidden="true">
                      <button class="volume-pop-btn" id="volumeToggle" type="button" aria-label="Mute"><svg id="volIcon" viewBox="0 0 24 24" aria-hidden="true" fill="none"><path d="M11 5L6.5 9H3v6h3.5L11 19V5Z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/><path d="M15.5 8.5a4.5 4.5 0 0 1 0 7" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><path d="M17.8 6.2a8 8 0 0 1 0 11.6" stroke="currentColor" stroke-width="2" stroke-linecap="round" opacity="0.85"/></svg><svg id="volMutedIcon" viewBox="0 0 24 24" aria-hidden="true" fill="none" style="display:none"><path d="M11 5L6.5 9H3v6h3.5L11 19V5Z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/><path d="M15 9l6 6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><path d="M21 9l-6 6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg></button>
                      <input class="volume-pop-slider" id="volumeSlider" type="range" min="0" max="100" step="1" value="100">
                    </div>
                  </div>
                  <button class="icon-btn" id="fitModeBtn" type="button" aria-label="Video size mode: Crop" title="Video size mode: Crop">
                    <svg class="fit-icon" viewBox="0 0 24 24" aria-hidden="true" fill="none"><rect x="4" y="6" width="16" height="12" rx="2" stroke="currentColor" stroke-width="1.8"/><path d="M8 10h8v4H8z" fill="currentColor" opacity="0.9"/><path d="M7 4v4M17 4v4M7 16v4M17 16v4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
                    <span class="sr-only">Video size mode: Crop</span>
                  </button>
                  <button class="icon-btn" id="fullscreenBtn" type="button" aria-label="Fullscreen">
                    <svg id="enterFsIcon" viewBox="0 0 24 24" aria-hidden="true" fill="none"><path d="M8 4H4v4M16 4h4v4M8 20H4v-4M16 20h4v-4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><path d="M9 9 4.8 4.8M15 9l4.2-4.2M9 15l-4.2 4.2M15 15l4.2 4.2" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
                    <svg id="exitFsIcon" viewBox="0 0 24 24" aria-hidden="true" fill="none" style="display:none"><path d="M9 4v5H4M15 4v5h5M9 20v-5H4M15 20v-5h5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><path d="M9 9 4.8 4.8M15 9l4.2-4.2M9 15l-4.2 4.2M15 15l4.2 4.2" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
                    <span class="sr-only">Fullscreen</span>
                  </button>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>

const PRODUCTION_API_ORIGIN='https://streamverse-api.duckdns.org';const API_BASE=/^(localhost|127\.0\.0\.1)$/i.test(window.location.hostname)?'http://127.0.0.1:3002':PRODUCTION_API_ORIGIN;const apiUrl=(path)=>`${API_BASE}${String(path||'').startsWith('/')?path:`/${path}`}`;
const pathParts=location.pathname.split('/').filter(Boolean);const params=new URLSearchParams(location.search);const routeCategory=pathParts[0]||'';const routeType=pathParts[1]||'';const isNestedRecapRoute=['recaps','test-player'].includes(routeType);const routeId=isNestedRecapRoute?pathParts[3]||'' : pathParts[1]||'';const routeTitle=isNestedRecapRoute?pathParts.slice(4).join(' ') : pathParts.slice(2).join(' ');const id=params.get('id')||decodeURIComponent(routeId||'');const titleParam=decodeURIComponent(routeTitle||'');const backToRecapsBtn=document.getElementById('backToRecapsBtn');const player=document.getElementById('videoPlayer');const sourcesEl=document.getElementById('sources');const topbar=document.getElementById('topbar');const playerShell=document.getElementById('playerShell');const playerFrame=document.getElementById('playerFrame');const playerHead=document.getElementById('playerHead');const playerMeta=document.getElementById('playerMeta');const detailsEl=document.getElementById('details');const titleEl=document.getElementById('pageTitle');const subEl=document.getElementById('pageSub');const streamTitleEl=document.getElementById('streamTitle');const streamSubEl=document.getElementById('streamSub');const detailsTitleEl=document.getElementById('detailsTitle');const detailsTextEl=document.getElementById('detailsText');const stateChip=document.getElementById('streamState');const countChip=document.getElementById('sourceCountChip');const modeChip=document.getElementById('modeChip');const hudStatus=document.getElementById('hudStatus');const playPauseBtn=document.getElementById('playPauseBtn');const playIcon=document.getElementById('playIcon');const pauseIcon=document.getElementById('pauseIcon');const muteIcon=document.getElementById('muteIcon');const unmuteIcon=document.getElementById('unmuteIcon');const seekBar=document.getElementById('seekBar');const currentTimeEl=document.getElementById('currentTime');const durationTimeEl=document.getElementById('durationTime');const volumePopover=document.getElementById('volumePopover');const volumeToggle=document.getElementById('volumeToggle');const volIcon=document.getElementById('volIcon');const volMutedIcon=document.getElementById('volMutedIcon');const volumeSlider=document.getElementById('volumeSlider');const fitModeBtn=document.getElementById('fitModeBtn');const fullscreenBtn=document.getElementById('fullscreenBtn');const enterFsIcon=document.getElementById('enterFsIcon');const exitFsIcon=document.getElementById('exitFsIcon');let hls=null,fitMode='fill',controlsHideTimer=null,playerControlsLocked=false,isDraggingSeek=false,pendingSeekPercent=null;

const prettifyTitle=(value='')=>{
  const raw=String(value||'').trim();
  if(!raw) return 'Untitled Replay';
  const cleaned=raw
    .replace(/^\/+|\/+$/g,'')
    .replace(/[_\-]+/g,' ')
    .replace(/[\/]+/g,' ')
    .replace(/\s+/g,' ')
    .trim();
  const tokens=cleaned.split(' ').filter(Boolean);

  let last='';

    out.push(token);

if (backToRecapsBtn) {

const buildHlsProxyUrl = (sourceUrl, referer, origin = '', userAgent = '') => {
  const raw = String(sourceUrl || '').trim();
  if (!raw) return '';
  if (raw.startsWith(apiUrl('/api/media-proxy')) || raw.startsWith('/api/media-proxy') || raw.includes('/api/media-proxy?')) {
    return raw;
  }
  if (!/^https?:\/\//i.test(raw)) {
    return raw;
  }
  try {
    const q = new URLSearchParams({ url: raw.replace(/\\&/g, '&').replace(/&amp;/g, '&').replace(/\\u0026/g, '&').replace(/\\/g, '') });
    if (referer) {
      q.set('referer', referer);
      q.set('root_referer', referer);
    }
    if (origin) q.set('origin', origin);
    if (userAgent) q.set('user_agent', userAgent);
    return `${apiUrl('/api/media-proxy')}?${q.toString()}`;

  }

const buildPlayable=(sources=[],headers={})=>(sources||[]).map(s=>({ ...s,url:String(s?.url||'').trim(),isM3U8:Boolean(s?.isM3U8)||/\.m3u8(\?|#|$)/i.test(String(s?.url||'')),headers:{...(headers||{}),...(s?.headers||{})},referer:s?.referer||s?.headers?.Referer||s?.headers?.referer||headers?.Referer||headers?.referer||'',origin:s?.origin||s?.headers?.Origin||s?.headers?.origin||headers?.Origin||headers?.origin||'',userAgent:s?.userAgent||s?.user_agent||s?.headers?.['User-Agent']||headers?.['User-Agent']||''})).filter(s=>s.url);

playPauseBtn?.addEventListener('click',togglePlayPause);document.getElementById('backTenBtn')?.addEventListener('click',()=>seekRelative(-10));document.getElementById('forwardTenBtn')?.addEventListener('click',()=>seekRelative(10));document.getElementById('controlsLockBtn')?.addEventListener('click',(e)=>{e.stopPropagation();setControlsLocked(!playerControlsLocked);});

async function load(){ if(!id){streamTitleEl.textContent='No race selected';detailsTitleEl.textContent='Missing event id';detailsTextEl.textContent='Open a recap first, then this page will fetch and play the selected race stream.';sourcesEl.innerHTML='<div class="empty">Missing id query parameter.</div>';setStatus('Waiting for selection','warn');return;} titleEl.textContent='';subEl.textContent='';streamTitleEl.textContent=prettifyTitle(titleParam || id);streamSubEl.textContent='Fetching the race source from the backend';setStatus('Resolving source','warn');try{const isRacingRecap=routeCategory==='formula-1'||routeCategory==='racing'||/recaps/i.test(location.pathname);const response=isRacingRecap?await fetch(apiUrl(`/api/racing/watch?episodeId=${encodeURIComponent(id)}`),{cache:'no-store'}):await fetch(apiUrl('/api/fetchSources'),{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({eventUrl:id}),cache:'no-store'});const result=await response.json();if(!response.ok||!result.success) throw new Error(result.error||`Source fetch failed (${response.status})`);const playable=buildPlayable(result.data?.sources||result.sources||[],result.data?.headers||result.headers||{});currentPlayableSources=playable;renderSources(playable);streamTitleEl.textContent=prettifyTitle(result.data?.title||titleParam||id);streamSubEl.textContent='Loaded sources and ready for playback';detailsTitleEl.textContent='';detailsTextEl.textContent='';detailsEl.textContent='';if(playable[0]){await play(playable[0]); player.style.objectFit='cover'; fitMode='fill'; syncUI();showControls(true);}}catch(err){console.error(err);streamTitleEl.textContent='Unable to load stream';detailsTitleEl.textContent='Source fetch failed';detailsTextEl.textContent=err.message||'Unknown error';sourcesEl.innerHTML=`<div class="empty">${err.message||'Unknown error'}</div>`;setStatus('Source fetch failed','warn');}}
